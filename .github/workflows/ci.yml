name: CI

on:
  push:
    branches-ignore: ["main"]

env:
  IMAGE_NAME: mm404/nordvpn-sidecar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Detect build version
      id: version
      run: echo "version=$(grep "^ARG NORDVPN_VERSION" Dockerfile | cut -d'=' -f2)" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: mm404
        password: ${{ secrets.DOCKER_HUB_KEY }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=dev-${{ steps.version.outputs.version }}-{{branch}}-{{sha}},enable=${{ github.ref_type == 'branch' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          GIT_REVISION=${{ github.sha }}
